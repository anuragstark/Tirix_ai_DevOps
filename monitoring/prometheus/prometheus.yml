global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["__APP_PRIVATE_IP__:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["__APP_PRIVATE_IP__:8080"]

  - job_name: "backend"
    static_configs:
      - targets: ["__APP_PRIVATE_IP__:8000"]
    metrics_path: "/api/metrics/prometheus"

  - job_name: "gateway"
    static_configs:
      - targets: ["__APP_PRIVATE_IP__:8080"]
    metrics_path: "/metrics"
