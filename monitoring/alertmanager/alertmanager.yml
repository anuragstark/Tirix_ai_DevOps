route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'resend-email'

receivers:
  - name: 'resend-email'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        from: '${ALERT_EMAIL_FROM}'
        smarthost: 'smtp.resend.com:465'
        auth_username: 'resend'
        auth_password: '${RESEND_API_KEY}'
        require_tls: true
