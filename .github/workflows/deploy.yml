name: Infra Provision & App Deploy

on:
  repository_dispatch:
    types: [deploy_app]
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials for S3 State
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create OCI API Key File
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init
        working-directory: ./terraform/environments/production
        run: terraform init

      - name: Terraform Apply
        working-directory: ./terraform/environments/production
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path: "/home/runner/.oci/oci_api_key.pem"
          TF_VAR_region: ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_OCID }}
          TF_VAR_ssh_public_key: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: terraform apply -auto-approve

      - name: Get IPs
        id: tf_outputs
        working-directory: ./terraform/environments/production
        run: |
          APP_PRIVATE_IP=$(terraform output -raw app_private_ip)
          APP_PUBLIC_IP=$(terraform output -raw public_ip)
          DEVOPS_PRIVATE_IP=$(terraform output -raw devops_private_ip)
          DEVOPS_PUBLIC_IP=$(terraform output -raw devops_public_ip)
          
          echo "app_public_ip=${APP_PUBLIC_IP}" >> $GITHUB_OUTPUT
          echo "devops_public_ip=${DEVOPS_PUBLIC_IP}" >> $GITHUB_OUTPUT
          echo "app_private_ip=${APP_PRIVATE_IP}" >> $GITHUB_OUTPUT
          echo "devops_private_ip=${DEVOPS_PRIVATE_IP}" >> $GITHUB_OUTPUT
          
          # Write summary
          echo "### 🚀 Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "App VM Public IP: **${APP_PUBLIC_IP}**" >> $GITHUB_STEP_SUMMARY
          echo "DevOps VM Public IP: **${DEVOPS_PUBLIC_IP}**" >> $GITHUB_STEP_SUMMARY
    outputs:
      app_public_ip: ${{ steps.tf_outputs.outputs.app_public_ip }}
      devops_public_ip: ${{ steps.tf_outputs.outputs.devops_public_ip }}
      app_private_ip: ${{ steps.tf_outputs.outputs.app_private_ip }}
      devops_private_ip: ${{ steps.tf_outputs.outputs.devops_private_ip }}

  deploy_app:
    name: Provision & Deploy App
    needs: terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Wait for VMs SSH to be ready (if just created)
        run: sleep 45

      - name: Deploy to App VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.app_public_ip }}
          username: opc
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script: |
            echo "==> Pulling latest DevOps repo..."
            if [ ! -d "/home/deploy/Tirix_ai_DevOps" ]; then
              sudo mkdir -p /home/deploy
              sudo git clone https://github.com/${{ github.repository }}.git /home/deploy/Tirix_ai_DevOps
            else
              cd /home/deploy/Tirix_ai_DevOps && sudo git pull
            fi

            echo "==> Running Provisioning (safe to run multiple times)..."
            sudo bash /home/deploy/Tirix_ai_DevOps/scripts/provision.sh app

            echo "==> Authenticating to GHCR..."
            sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GH_PAT_TOKEN }}

            echo "==> Deploying App Stack..."
            export DEVOPS_PRIVATE_IP="${{ needs.terraform.outputs.devops_private_ip }}"
            cd /opt/tirixai
            sudo -E bash /opt/tirixai/scripts/deploy.sh app

  deploy_devops:
    name: Provision & Deploy DevOps
    needs: terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Deploy to DevOps VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.devops_public_ip }}
          username: opc
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script: |
            echo "==> Pulling latest DevOps repo..."
            if [ ! -d "/home/deploy/Tirix_ai_DevOps" ]; then
              sudo mkdir -p /home/deploy
              sudo git clone https://github.com/${{ github.repository }}.git /home/deploy/Tirix_ai_DevOps
            else
              cd /home/deploy/Tirix_ai_DevOps && sudo git pull
            fi

            echo "==> Running Provisioning (safe to run multiple times)..."
            sudo bash /home/deploy/Tirix_ai_DevOps/scripts/provision.sh devops

            echo "==> Authenticating to GHCR..."
            sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GH_PAT_TOKEN }}

            echo "==> Injecting Alertmanager Secrets..."
            sudo sed -i '/^RESEND_API_KEY=/d' /opt/tirixai/.env.prod || true
            sudo sed -i '/^ALERT_EMAIL_FROM=/d' /opt/tirixai/.env.prod || true
            sudo sed -i '/^ALERT_EMAIL_TO=/d' /opt/tirixai/.env.prod || true
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" | sudo tee -a /opt/tirixai/.env.prod > /dev/null
            echo "ALERT_EMAIL_FROM=${{ secrets.ALERT_EMAIL_FROM }}" | sudo tee -a /opt/tirixai/.env.prod > /dev/null
            echo "ALERT_EMAIL_TO=${{ secrets.ALERT_EMAIL_TO }}" | sudo tee -a /opt/tirixai/.env.prod > /dev/null

            echo "==> Deploying DevOps Stack..."
            export APP_PRIVATE_IP="${{ needs.terraform.outputs.app_private_ip }}"
            export DEVOPS_PRIVATE_IP="${{ needs.terraform.outputs.devops_private_ip }}"
            cd /opt/tirixai
            sudo -E bash /opt/tirixai/scripts/deploy.sh devops
